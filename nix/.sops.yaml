# sops-nix secret encryption configuration.
# Run all sops commands from the nix/ directory (where this file lives).
#
# Setup workflow:
#   1. Install tools: nix shell nixpkgs#age nixpkgs#ssh-to-age
#   2. Get your operator age key: ssh-to-age < ~/.ssh/id_ed25519.pub
#   3. After `tofu apply`, get each host's age key:
#        ssh-keyscan -t ed25519 <HOST_IP> | ssh-to-age
#   4. Replace the placeholder age1... values below with real keys.
#   5. Create and encrypt each secrets file (from nix/):
#        sops secrets/edge.yaml
#        sops secrets/lldap.yaml
#        sops secrets/authelia.yaml
#        sops secrets/qbittorrent.yaml
#   6. To re-encrypt after adding a new host key (from nix/):
#        sops updatekeys secrets/<file>.yaml

keys:
  # Operator — can decrypt any secret file for editing
  # ssh-to-age < ~/.ssh/drew@x1c-g9.pub
  - &operator age18j3zdckfwd96muuayfey4r4gfqsf0r6wwq8gd6jjccqhjegj7pzscknx3g

  # Host keys — obtained after first `tofu apply`:
  #   ssh-keyscan -t ed25519 <IP> | ssh-to-age
  # During the single-VM migration, add lab-core here and include it in
  # edge.yaml, lldap.yaml, and authelia.yaml key groups before deploy-core.
  - &lab-edge        age1gynkf7was2ggtyhg5st7rc46qwuj96dtf2gw3zhlv3rwhg32r5uqvjar46
  - &lab-lldap       age1pt5wqp8wh8j8uunhzxkpjahd2q84a26smfv8lynd332cg3vq4qrslddvjt
  - &lab-authelia    age1w27h6fdjlmavelzun0yq4hfle3qdkeahmyr044wl6v84fhagguwqj3lg4c
  - &lab-qbittorrent   age1fujhzkqfh3xdh3yln72q0prsrhped6lw3qu0qr4snwa5fmyq4c0sqh5pzk
  - &lab-core        age1aaa4zalk4j8emsg2gyhm8jc4x9stv7rz3va99lfnvaf25y0x8p3swrj3mv

creation_rules:
  - path_regex: secrets/edge\.yaml$
    key_groups:
      - age: [*operator, *lab-edge, *lab-core]

  - path_regex: secrets/lldap\.yaml$
    key_groups:
      - age: [*operator, *lab-lldap, *lab-core]

  - path_regex: secrets/authelia\.yaml$
    key_groups:
      - age: [*operator, *lab-authelia, *lab-core]

  - path_regex: secrets/qbittorrent\.yaml$
    key_groups:
      - age: [*operator, *lab-qbittorrent]
