# sops-nix secret encryption configuration.
#
# Setup workflow:
#   1. Install tools: nix shell nixpkgs#age nixpkgs#ssh-to-age
#   2. Get your operator age key: ssh-to-age < ~/.ssh/id_ed25519.pub
#   3. After `tofu apply`, get each host's age key:
#        ssh-keyscan -t ed25519 <HOST_IP> | ssh-to-age
#   4. Replace the placeholder age1... values below with real keys.
#   5. Create and encrypt each secrets file:
#        sops secrets/edge.yaml
#        sops secrets/lldap.yaml
#        sops secrets/authelia.yaml
#        sops secrets/qbittorrent.yaml
#   6. To re-encrypt after adding a new host key:
#        sops updatekeys secrets/<file>.yaml

keys:
  # Operator — can decrypt any secret file for editing
  # ssh-to-age < ~/.ssh/drew@x1c-g9.pub
  - &operator age18j3zdckfwd96muuayfey4r4gfqsf0r6wwq8gd6jjccqhjegj7pzscknx3g

  # Host keys — replace after first `tofu apply`:
  #   ssh-keyscan -t ed25519 <IP> | ssh-to-age
  - &lab-edge        age1REPLACE_AFTER_PROVISION
  - &lab-lldap       age1REPLACE_AFTER_PROVISION
  - &lab-authelia    age1REPLACE_AFTER_PROVISION
  - &lab-qbittorrent age1REPLACE_AFTER_PROVISION

creation_rules:
  - path_regex: secrets/edge\.yaml$
    key_groups:
      - age: [*operator, *lab-edge]

  - path_regex: secrets/lldap\.yaml$
    key_groups:
      - age: [*operator, *lab-lldap]

  - path_regex: secrets/authelia\.yaml$
    key_groups:
      - age: [*operator, *lab-authelia]

  - path_regex: secrets/qbittorrent\.yaml$
    key_groups:
      - age: [*operator, *lab-qbittorrent]
