name: ci

on:
  pull_request:
    branches: [master]
    paths:
      - 'nix/**'
      - 'terraform/**'
      - '.github/workflows/**'
      - 'README.md'
  push:
    branches: [master]
    paths:
      - 'nix/**'
      - 'terraform/**'
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: nix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check ./nix

      - name: build core system closure
        run: nix build ./nix#nixosConfigurations.core.config.system.build.toplevel

  opentofu:
    name: opentofu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: tofu fmt
        run: tofu -chdir=terraform fmt -check -recursive

      - name: tofu init
        run: tofu -chdir=terraform init -backend=false

      - name: tofu validate
        run: tofu -chdir=terraform validate
