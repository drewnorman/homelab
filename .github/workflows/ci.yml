name: ci

on:
  pull_request:
    paths:
      - 'nix/**'
      - '.github/workflows/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: nix flake check
        run: nix flake check ./nix
