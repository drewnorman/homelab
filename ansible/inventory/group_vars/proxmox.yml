---
# Block device for the external media SSD. Run `lsblk` on the Proxmox host to confirm.
proxmox_media_ssd_device: /dev/sda

# VMID of the arr LXC (lab-arr).
proxmox_arr_lxc_vmid: 104

# VMID of the Jellyfin LXC (lab-jellyfin).
proxmox_jellyfin_lxc_vmid: 101

# LXCs that need /dev/net/tun for VPN-style interfaces.
proxmox_tun_lxc_names: "{{ [homelab_name ~ '-edge'] + ([homelab_name ~ '-qbittorrent-vpn'] if groups['qbittorrent_vpn'] | default([]) | length > 0 else []) }}"
