---
# Block device for the external media SSD. Run `lsblk` on the Proxmox host to confirm.
proxmox_media_ssd_device: /dev/sda

# VMID of the arr LXC (lab-arr). Find with `pct list` on the Proxmox host.
proxmox_arr_lxc_vmid: ~

# VMID of the Jellyfin LXC (lab-jellyfin). Find with `pct list` on the Proxmox host.
proxmox_jellyfin_lxc_vmid: ~
