---
homelab_domain: "lab.adre.me"
homelab_name: "lab"
timezone: "America/Denver"

per_host_ssh_key_fqdn: "{{ inventory_hostname | regex_replace('^' ~ homelab_name ~ '-', '') }}.{{ homelab_domain }}"
per_host_ssh_private_key_file: "~/.ssh/{{ ansible_user }}@{{ per_host_ssh_key_fqdn }}"
ansible_ssh_private_key_file: "{{ per_host_ssh_private_key_file }}"

docker_admin_user: "drew"
docker_compose_root: "/opt/compose"

edge_base_domain: "lab.adre.me"
edge_tls_mode: "public_dns"
edge_acme_email: "{{ lookup('env', 'EDGE_ACME_EMAIL') | default('', true) }}"
edge_acme_cloudflare_dns_api_token: "{{ lookup('env', 'CLOUDFLARE_DNS_API_TOKEN') | default(lookup('env', 'CLOUDFLARE_API_TOKEN'), true) }}"
edge_acme_cert_name: "{{ edge_base_domain }}"
edge_acme_lego_cert_path: "/var/lib/lego/certificates/{{ edge_acme_cert_name }}.crt"
edge_acme_lego_key_path: "/var/lib/lego/certificates/{{ edge_acme_cert_name }}.key"
edge_tls_cert_path: "/etc/caddy/certs/{{ edge_acme_cert_name }}.crt"
edge_tls_key_path: "/etc/caddy/certs/{{ edge_acme_cert_name }}.key"
edge_acme_dns_propagation_timeout: 600
edge_acme_dns_polling_interval: 10
edge_lego_version: "4.34.0"
edge_lego_archive_url: "https://github.com/go-acme/lego/releases/download/v{{ edge_lego_version }}/lego_v{{ edge_lego_version }}_linux_amd64.tar.gz"
edge_extra_services: []

tailscale_enabled: true
tailscale_track: stable
tailscale_hostname: "{{ inventory_hostname }}"
tailscale_accept_dns: false
tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') | default('', true) }}"
tailscale_advertised_routes:
  - "{{ hostvars[groups['adguard'][0]].ansible_host }}/32"
  - "{{ hostvars[groups['edge'][0]].ansible_host }}/32"
  - "{{ hostvars[groups['media'][0]].ansible_host }}/32"
  - "{{ hostvars[groups['nix'][0]].ansible_host }}/32"

adguard_bind_port: 80
adguard_admin_user: "admin"
adguard_admin_password_bcrypt: "{{ lookup('env', 'ADGUARD_ADMIN_PASSWORD_BCRYPT') | default('', true) }}"

adguard_upstream_dns:
  - "https://dns.cloudflare.com/dns-query"

adguard_bootstrap_dns:
  - "9.9.9.10"
  - "149.112.112.10"
  - "2620:fe::10"
  - "2620:fe::fe:10"

adguard_fallback_dns:
  - "https://dns.google/dns-query"

adguard_dns_blocked_hosts:
  - "version.bind"
  - "id.server"
  - "hostname.bind"

adguard_trusted_proxies:
  - "127.0.0.0/8"
  - "::1/128"

adguard_dns_rewrites:
  - domain: "nix.{{ homelab_domain }}"
    answer: "192.168.1.240"
  - domain: "*.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "adguard.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "jellyfin.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"

adguard_filters:
  - enabled: true
    url: "https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt"
    name: "AdGuard DNS filter"
    id: 1
  - enabled: false
    url: "https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt"
    name: "AdAway Default Blocklist"
    id: 2
  - enabled: true
    url: "https://small.oisd.nl/"
    name: "OISD Small"
    id: 1776125343
  - enabled: true
    url: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adblock/pro.plus.txt"
    name: "HaGeZi's Pro++ DNS Blocklist"
    id: 1776125344
  - enabled: true
    url: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adblock/tif.txt"
    name: "HaGeZi's Threat Intelligence Feeds DNS Blocklist"
    id: 1776125345

adguard_user_rules:
  - "||darnobedienceupscale.com^"
  - "||nublet.shop^"
  - "||janitorprecisiontrio.com^"
  - "||rhussvelter.com^"
  - "||matarketogen.qpon^"

jellyfin_extra_packages: []

qbittorrent_user: qbittorrent
qbittorrent_port: 8080
qbittorrent_listen_port: 6881
qbittorrent_host: "{{ hostvars[groups['qbittorrent_vpn'][0]].ansible_host if groups['qbittorrent_vpn'] | default([]) | length > 0 else 'localhost' }}"
qbittorrent_lan_cidr: "192.168.1.0/24"
qbittorrent_vpn_interface: wg0
qbittorrent_vpn_wireguard_config_b64: "{{ lookup('env', 'PROTONVPN_WIREGUARD_CONFIG_B64') | default('', true) }}"
qbittorrent_vpn_peer_port: 51820
byparr_enabled: true
byparr_user: byparr
byparr_repo_url: "https://github.com/ThePhaseless/Byparr.git"
byparr_version: "v2.1.0"
byparr_install_dir: /opt/byparr
byparr_port: 8191
byparr_proxy_tag: byparr
prowlarr_cloudflare_indexers:
  - "1337x"

# Check GitHub releases for current versions before deploying.
arr_media_path: /mnt/media/media
arr_downloads_path: /mnt/media/downloads
arr_indexer_maximum_size_mb: 1536
bazarr_version: "1.5.6"
bazarr_user: bazarr
bazarr_port: 6767
bazarr_install_dir: /opt/bazarr
bazarr_data_dir: /var/lib/bazarr
bazarr_archive_url: "https://github.com/morpheus65535/bazarr/releases/download/v{{ bazarr_version }}/bazarr.zip"

jellyfin_media_path: /mnt/media/media
arr_apps:
  - name: prowlarr
    user: prowlarr
    port: 9696
    install_dir: /opt/prowlarr
    data_dir: /var/lib/prowlarr
    binary: Prowlarr
    archive_url: "https://github.com/Prowlarr/Prowlarr/releases/download/v2.3.5.5327/Prowlarr.master.2.3.5.5327.linux-core-x64.tar.gz"
  - name: radarr
    user: radarr
    port: 7878
    install_dir: /opt/radarr
    data_dir: /var/lib/radarr
    binary: Radarr
    archive_url: "https://github.com/Radarr/Radarr/releases/download/v5.14.0.9383/Radarr.master.5.14.0.9383.linux-core-x64.tar.gz"
    media_subdir: movies
    qbt_category_field: movieCategory
  - name: sonarr
    user: sonarr
    port: 8989
    install_dir: /opt/sonarr
    data_dir: /var/lib/sonarr
    binary: Sonarr
    archive_url: "https://github.com/Sonarr/Sonarr/releases/download/v4.0.9.2244/Sonarr.main.4.0.9.2244.linux-x64.tar.gz"
    media_subdir: tv
    qbt_category_field: tvCategory
