---
homelab_domain: "lab.adre.me"
homelab_name: "lab"
timezone: "America/Denver"

per_host_ssh_key_fqdn: "{{ inventory_hostname | regex_replace('^' ~ homelab_name ~ '-', '') }}.{{ homelab_domain }}"
per_host_ssh_private_key_file: "~/.ssh/{{ ansible_user }}@{{ per_host_ssh_key_fqdn }}"
ansible_ssh_private_key_file: "{{ per_host_ssh_private_key_file }}"

docker_admin_user: "drew"
docker_compose_root: "/opt/compose"

edge_base_domain: "lab.adre.me"
edge_tls_mode: "public_dns"
edge_acme_email: "{{ lookup('env', 'EDGE_ACME_EMAIL') | default('', true) }}"
edge_acme_porkbun_api_key: "{{ lookup('env', 'PORKBUN_API_KEY') | default('', true) }}"
edge_acme_porkbun_secret_api_key: "{{ lookup('env', 'PORKBUN_SECRET_API_KEY') | default('', true) }}"
edge_acme_cert_name: "_.{{ edge_base_domain }}"
edge_acme_lego_cert_path: "/var/lib/lego/certificates/{{ edge_acme_cert_name }}.crt"
edge_acme_lego_key_path: "/var/lib/lego/certificates/{{ edge_acme_cert_name }}.key"
edge_tls_cert_path: "/etc/caddy/certs/{{ edge_acme_cert_name }}.crt"
edge_tls_key_path: "/etc/caddy/certs/{{ edge_acme_cert_name }}.key"
edge_acme_dns_propagation_timeout: 600
edge_acme_dns_polling_interval: 10
edge_acme_dns_ttl: 300
edge_lego_version: "4.34.0"
edge_lego_archive_url: "https://github.com/go-acme/lego/releases/download/v{{ edge_lego_version }}/lego_v{{ edge_lego_version }}_linux_amd64.tar.gz"
edge_extra_services: []

adguard_bind_port: 80
adguard_admin_user: "admin"
adguard_admin_password_bcrypt: "{{ lookup('env', 'ADGUARD_ADMIN_PASSWORD_BCRYPT') | default('', true) }}"

adguard_upstream_dns:
  - "https://dns.cloudflare.com/dns-query"

adguard_bootstrap_dns:
  - "9.9.9.10"
  - "149.112.112.10"
  - "2620:fe::10"
  - "2620:fe::fe:10"

adguard_fallback_dns:
  - "https://dns.google/dns-query"

adguard_dns_blocked_hosts:
  - "version.bind"
  - "id.server"
  - "hostname.bind"

adguard_trusted_proxies:
  - "127.0.0.0/8"
  - "::1/128"

adguard_dns_rewrites:
  - domain: "nix.{{ homelab_domain }}"
    answer: "192.168.1.240"
  - domain: "*.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "adguard.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"
  - domain: "jellyfin.{{ homelab_domain }}"
    answer: "{{ hostvars[groups['edge'][0]].ansible_host }}"

adguard_filters:
  - enabled: true
    url: "https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt"
    name: "AdGuard DNS filter"
    id: 1
  - enabled: false
    url: "https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt"
    name: "AdAway Default Blocklist"
    id: 2
  - enabled: true
    url: "https://small.oisd.nl/"
    name: "OISD Small"
    id: 1776125343
  - enabled: true
    url: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adblock/pro.plus.txt"
    name: "HaGeZi's Pro++ DNS Blocklist"
    id: 1776125344
  - enabled: true
    url: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adblock/tif.txt"
    name: "HaGeZi's Threat Intelligence Feeds DNS Blocklist"
    id: 1776125345

adguard_user_rules:
  - "||darnobedienceupscale.com^"
  - "||nublet.shop^"
  - "||janitorprecisiontrio.com^"
  - "||rhussvelter.com^"
  - "||matarketogen.qpon^"

jellyfin_extra_packages: []
