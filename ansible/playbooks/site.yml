---
- name: Bootstrap all guests
  hosts: all:!nix
  become: true
  roles:
    - common

- name: Configure AdGuard Home
  hosts: adguard
  become: true
  roles:
    - adguard

- name: Configure edge proxy and DDNS
  hosts: edge
  become: true
  roles:
    - edge

- name: Configure Docker host
  hosts: docker
  become: true
  roles:
    - docker_host

- name: Configure media automation host
  hosts: arr
  become: true
  roles:
    - arr

- name: Configure Jellyfin host
  hosts: media
  become: true
  roles:
    - jellyfin

- name: Configure NixOS host
  hosts: nix
  gather_facts: false
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: "~/.ssh/root@192.168.1.200"
  roles:
    - nix_host
