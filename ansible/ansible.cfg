[defaults]
inventory = inventory/hosts.ini
roles_path = roles
host_key_checking = False
interpreter_python = auto_silent
stdout_callback = default
retry_files_enabled = False
nocows = True
private_key_file = /home/drew/.ssh/root@172.16.0.200

[ssh_connection]
ssh_args = -F /dev/null -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes
pipelining = True
