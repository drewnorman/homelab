---
- name: Clone or update NixOS configuration repository
  ansible.builtin.raw: |
    export NIX_CONFIG="extra-experimental-features = nix-command flakes"
    if [ -d "{{ nix_config_clone_path }}/.git" ]; then
      nix shell nixpkgs#git --command git -C "{{ nix_config_clone_path }}" fetch origin
      nix shell nixpkgs#git --command git -C "{{ nix_config_clone_path }}" reset --hard origin/master
    else
      nix shell nixpkgs#git --command git clone "{{ nix_config_repo_url }}" "{{ nix_config_clone_path }}"
    fi
  changed_when: true

- name: Apply NixOS flake configuration
  ansible.builtin.raw: |
    export NIX_CONFIG="extra-experimental-features = nix-command flakes"
    nix shell nixpkgs#git --command nixos-rebuild switch --flake {{ nix_config_clone_path }}#{{ nix_config_flake_host }}
  changed_when: true
