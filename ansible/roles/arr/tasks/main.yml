---
- name: Install arr stack dependencies
  ansible.builtin.apt:
    name:
      - libicu72
      - libssl3
      - sqlite3
      - qbittorrent-nox
    state: present
    update_cache: true

- name: Create media group
  ansible.builtin.group:
    name: media
    gid: 1000
    system: true
    state: present

- name: Create qbittorrent user
  ansible.builtin.user:
    name: "{{ qbittorrent_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/qbittorrent
    create_home: true
    groups: media
    append: true
    state: present

- name: Enable qBittorrent service
  ansible.builtin.service:
    name: "qbittorrent-nox@{{ qbittorrent_user }}"
    enabled: true
    state: started

- name: Create download directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_user }}"
    group: media
    mode: "0775"
  loop:
    - "{{ arr_downloads_path }}"
    - "{{ arr_downloads_path }}/complete"
    - "{{ arr_downloads_path }}/complete/movies"
    - "{{ arr_downloads_path }}/complete/tv"
    - "{{ arr_downloads_path }}/incomplete"

- name: Create arr service users
  ansible.builtin.user:
    name: "{{ item.user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ item.data_dir }}"
    create_home: false
    groups: media
    append: true
    state: present
  loop: "{{ arr_apps }}"

- name: Create arr install directories
  ansible.builtin.file:
    path: "{{ item.install_dir }}"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0755"
  loop: "{{ arr_apps }}"

- name: Create arr data directories
  ansible.builtin.file:
    path: "{{ item.data_dir }}"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0750"
  loop: "{{ arr_apps }}"

- name: Create media directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: media
    mode: "0775"
  loop:
    - "{{ arr_media_path }}"
    - "{{ arr_media_path }}/movies"
    - "{{ arr_media_path }}/tv"

- name: Download arr app archives
  ansible.builtin.get_url:
    url: "{{ item.archive_url }}"
    dest: "/tmp/{{ item.archive_url | basename }}"
    mode: "0644"
  loop: "{{ arr_apps }}"

- name: Extract arr app archives
  ansible.builtin.unarchive:
    src: "/tmp/{{ item.archive_url | basename }}"
    dest: "{{ item.install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    creates: "{{ item.install_dir }}/{{ item.binary }}"
  loop: "{{ arr_apps }}"

- name: Install arr systemd service units
  ansible.builtin.template:
    src: arr-service.service.j2
    dest: "/etc/systemd/system/{{ item.name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ arr_apps }}"

- name: Reload systemd after service unit changes
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Enable arr services
  ansible.builtin.service:
    name: "{{ item.name }}"
    enabled: true
    state: started
  loop: "{{ arr_apps }}"
