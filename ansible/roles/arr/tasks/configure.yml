---
- name: Wait for {{ arr_app.name }} config file
  ansible.builtin.wait_for:
    path: "{{ arr_app.data_dir }}/config.xml"
    timeout: 60

- name: Read {{ arr_app.name }} config
  ansible.builtin.slurp:
    src: "{{ arr_app.data_dir }}/config.xml"
  register: _arr_app_config

- name: Extract {{ arr_app.name }} API key
  ansible.builtin.set_fact:
    _arr_app_api_key: "{{ _arr_app_config.content | b64decode | regex_search('<ApiKey>(.*?)</ApiKey>', '\\1') | first }}"

- name: Wait for {{ arr_app.name }} API
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/system/status"
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
  register: _arr_api_status
  until: _arr_api_status.status == 200
  retries: 30
  delay: 2

# Root folder

- name: Get {{ arr_app.name }} root folders
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/rootfolder"
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
  register: _arr_root_folders

- name: Create {{ arr_app.name }} root folder
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/rootfolder"
    method: POST
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
    body_format: json
    body:
      path: "{{ arr_media_path }}/{{ arr_app.media_subdir }}"
    status_code: [200, 201]
  when: _arr_root_folders.json | selectattr('path', 'equalto', arr_media_path + '/' + arr_app.media_subdir) | list | length == 0

# Download client

- name: Get {{ arr_app.name }} download clients
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/downloadclient"
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
  register: _arr_download_clients

- name: Set {{ arr_app.name }} needs qBittorrent
  ansible.builtin.set_fact:
    _arr_needs_qbt: "{{ _arr_download_clients.json | selectattr('implementation', 'equalto', 'QBittorrent') | list | length == 0 }}"

- name: Get {{ arr_app.name }} download client schemas
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/downloadclient/schema"
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
  register: _arr_dc_schemas
  when: _arr_needs_qbt

- name: Extract {{ arr_app.name }} qBittorrent schema
  ansible.builtin.set_fact:
    _arr_qbt_schema: "{{ _arr_dc_schemas.json | selectattr('implementation', 'equalto', 'QBittorrent') | first }}"
  when: _arr_needs_qbt

- name: Set {{ arr_app.name }} qBittorrent field overrides
  ansible.builtin.set_fact:
    _arr_qbt_overrides: "{{ {'host': 'localhost', 'port': qbittorrent_port, 'useSsl': false, arr_app.qbt_category_field: arr_app.name} }}"
  when: _arr_needs_qbt

- name: Reset {{ arr_app.name }} qBittorrent fields list
  ansible.builtin.set_fact:
    _arr_qbt_fields: []
  when: _arr_needs_qbt

- name: Build {{ arr_app.name }} qBittorrent fields
  ansible.builtin.set_fact:
    _arr_qbt_fields: "{{ _arr_qbt_fields + [item | combine({'value': _arr_qbt_overrides[item.name]} if item.name in _arr_qbt_overrides else {})] }}"
  loop: "{{ _arr_qbt_schema.fields if _arr_needs_qbt else [] }}"
  when: _arr_needs_qbt

- name: Create {{ arr_app.name }} qBittorrent download client
  ansible.builtin.uri:
    url: "http://localhost:{{ arr_app.port }}/api/v3/downloadclient"
    method: POST
    headers:
      X-Api-Key: "{{ _arr_app_api_key }}"
    body_format: json
    body: "{{ _arr_qbt_schema | combine({'enable': true, 'name': 'qBittorrent', 'fields': _arr_qbt_fields}) }}"
    status_code: [200, 201]
  when: _arr_needs_qbt
