---
- name: Wait for Sonarr config file for Bazarr
  ansible.builtin.wait_for:
    path: /var/lib/sonarr/config.xml
    timeout: 60

- name: Wait for Radarr config file for Bazarr
  ansible.builtin.wait_for:
    path: /var/lib/radarr/config.xml
    timeout: 60

- name: Read Sonarr config for Bazarr
  ansible.builtin.slurp:
    src: /var/lib/sonarr/config.xml
  register: _bazarr_sonarr_config
  no_log: true

- name: Read Radarr config for Bazarr
  ansible.builtin.slurp:
    src: /var/lib/radarr/config.xml
  register: _bazarr_radarr_config
  no_log: true

- name: Extract Sonarr and Radarr API keys for Bazarr
  ansible.builtin.set_fact:
    _bazarr_sonarr_api_key: "{{ _bazarr_sonarr_config.content | b64decode | regex_search('<ApiKey>(.*?)</ApiKey>', '\\1') | first }}"
    _bazarr_radarr_api_key: "{{ _bazarr_radarr_config.content | b64decode | regex_search('<ApiKey>(.*?)</ApiKey>', '\\1') | first }}"
  no_log: true

- name: Configure Bazarr Sonarr API key
  ansible.builtin.replace:
    path: "{{ bazarr_data_dir }}/config/config.yaml"
    regexp: '(^sonarr:\n  apikey: ).*$'
    replace: '\g<1>{{ _bazarr_sonarr_api_key }}'
  register: _bazarr_sonarr_key
  no_log: true

- name: Configure Bazarr Radarr API key
  ansible.builtin.replace:
    path: "{{ bazarr_data_dir }}/config/config.yaml"
    regexp: '(^radarr:\n  apikey: ).*$'
    replace: '\g<1>{{ _bazarr_radarr_api_key }}'
  register: _bazarr_radarr_key
  no_log: true

- name: Configure Bazarr Sonarr endpoint
  ansible.builtin.replace:
    path: "{{ bazarr_data_dir }}/config/config.yaml"
    regexp: '(^sonarr:\n(?:  .*\n)*?  {{ item.key }}: ).*$'
    replace: '\g<1>{{ item.value }}'
  loop:
    - { key: ip, value: "127.0.0.1" }
    - { key: port, value: "8989" }
    - { key: ssl, value: "false" }
  register: _bazarr_sonarr_endpoint

- name: Configure Bazarr Radarr endpoint
  ansible.builtin.replace:
    path: "{{ bazarr_data_dir }}/config/config.yaml"
    regexp: '(^radarr:\n(?:  .*\n)*?  {{ item.key }}: ).*$'
    replace: '\g<1>{{ item.value }}'
  loop:
    - { key: ip, value: "127.0.0.1" }
    - { key: port, value: "7878" }
    - { key: ssl, value: "false" }
  register: _bazarr_radarr_endpoint

- name: Restart Bazarr after connection changes
  ansible.builtin.service:
    name: bazarr
    state: restarted
  when: >
    _bazarr_sonarr_key.changed or
    _bazarr_radarr_key.changed or
    _bazarr_sonarr_endpoint.changed or
    _bazarr_radarr_endpoint.changed
