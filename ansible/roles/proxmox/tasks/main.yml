---
- name: Install SSD management packages
  ansible.builtin.apt:
    name:
      - parted
      - e2fsprogs
    state: present

- name: Partition media SSD
  community.general.parted:
    device: "{{ proxmox_media_ssd_device }}"
    number: 1
    label: gpt
    state: present
    part_end: "100%"

- name: Format media SSD partition as ext4
  community.general.filesystem:
    fstype: ext4
    dev: "{{ proxmox_media_ssd_device }}1"
    state: present

- name: Create /mnt/media mount point
  ansible.builtin.file:
    path: /mnt/media
    state: directory
    mode: "0755"

- name: Get media SSD partition UUID
  ansible.builtin.command: blkid -s UUID -o value {{ proxmox_media_ssd_device }}1
  register: proxmox_media_ssd_uuid
  changed_when: false

- name: Mount media SSD via fstab
  ansible.posix.mount:
    path: /mnt/media
    src: "UUID={{ proxmox_media_ssd_uuid.stdout }}"
    fstype: ext4
    opts: defaults
    state: mounted

- name: Create media directory structure on SSD
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "100000"
    group: "101000"
    mode: "2775"
  loop:
    - /mnt/media/media
    - /mnt/media/media/movies
    - /mnt/media/media/tv
    - /mnt/media/downloads
    - /mnt/media/downloads/complete
    - /mnt/media/downloads/complete/movies
    - /mnt/media/downloads/complete/tv
    - /mnt/media/downloads/incomplete

- name: List Proxmox containers for bind mount configuration
  ansible.builtin.shell: pct list | awk 'NR > 1 { print $NF "=" $1 }'
  register: _proxmox_pct_list_mp
  changed_when: false

- name: Resolve arr LXC VMID
  ansible.builtin.set_fact:
    _proxmox_arr_lxc_vmid: "{{ _proxmox_pct_list_mp.stdout_lines | select('match', '^' ~ proxmox_arr_lxc_name ~ '=') | first | regex_replace('^.*=', '') }}"

- name: Resolve Jellyfin LXC VMID
  ansible.builtin.set_fact:
    _proxmox_jellyfin_lxc_vmid: "{{ _proxmox_pct_list_mp.stdout_lines | select('match', '^' ~ proxmox_jellyfin_lxc_name ~ '=') | first | regex_replace('^.*=', '') }}"

- name: Verify bind mount LXCs were found
  ansible.builtin.assert:
    that:
      - _proxmox_arr_lxc_vmid | length > 0
      - _proxmox_jellyfin_lxc_vmid | length > 0
    fail_msg: "Could not resolve VMIDs for {{ proxmox_arr_lxc_name }} and {{ proxmox_jellyfin_lxc_name }}"

- name: Configure arr LXC bind mount
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ _proxmox_arr_lxc_vmid }}.conf"
    regexp: "^mp0:"
    line: "mp0: /mnt/media,mp=/mnt/media"
  register: arr_lxc_mp

- name: Configure Jellyfin LXC bind mount
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ _proxmox_jellyfin_lxc_vmid }}.conf"
    regexp: "^mp0:"
    line: "mp0: /mnt/media,mp=/mnt/media"
  register: jellyfin_lxc_mp

- name: Stop arr LXC to apply bind mount
  ansible.builtin.command: pct stop {{ _proxmox_arr_lxc_vmid }}
  when: arr_lxc_mp.changed
  changed_when: true

- name: Start arr LXC
  ansible.builtin.command: pct start {{ _proxmox_arr_lxc_vmid }}
  when: arr_lxc_mp.changed
  changed_when: true

- name: Stop Jellyfin LXC to apply bind mount
  ansible.builtin.command: pct stop {{ _proxmox_jellyfin_lxc_vmid }}
  when: jellyfin_lxc_mp.changed
  changed_when: true

- name: Start Jellyfin LXC
  ansible.builtin.command: pct start {{ _proxmox_jellyfin_lxc_vmid }}
  when: jellyfin_lxc_mp.changed
  changed_when: true

- name: Set Proxmox TUN LXC names
  ansible.builtin.set_fact:
    _proxmox_tun_lxc_names: "{{ proxmox_tun_lxc_names | default(proxmox_tailscale_lxc_names | default([])) }}"

- name: List Proxmox containers for TUN configuration
  ansible.builtin.shell: pct list | awk 'NR > 1 { print $NF "=" $1 }'
  register: _proxmox_pct_list
  changed_when: false
  when: _proxmox_tun_lxc_names | length > 0

- name: Resolve TUN LXC VMIDs
  ansible.builtin.set_fact:
    _proxmox_tun_lxc_vmids: "{{ (_proxmox_tun_lxc_vmids | default([])) + _proxmox_tun_lxc_vmid_candidate }}"
  vars:
    _proxmox_tun_lxc_vmid: "{{ _proxmox_pct_list.stdout_lines | select('match', '^' ~ item ~ '=') | first | default('') | regex_replace('^.*=', '') }}"
    _proxmox_tun_lxc_vmid_candidate: "{{ [_proxmox_tun_lxc_vmid] if _proxmox_tun_lxc_vmid | length > 0 else [] }}"
  loop: "{{ _proxmox_tun_lxc_names }}"
  when: _proxmox_tun_lxc_names | length > 0

- name: Verify TUN LXCs were found
  ansible.builtin.assert:
    that:
      - _proxmox_tun_lxc_vmids | length == _proxmox_tun_lxc_names | length
    fail_msg: "Could not find all TUN LXCs by name: {{ _proxmox_tun_lxc_names | join(', ') }}"
  when: _proxmox_tun_lxc_names | length > 0

- name: Remove legacy TUN marker comments from selected LXCs
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ item }}.conf"
    regexp: "^# (BEGIN|END) ANSIBLE MANAGED TUN DEVICE$"
    state: absent
  loop: "{{ _proxmox_tun_lxc_vmids | default([]) }}"
  register: _proxmox_tun_marker_cleanup

- name: Allow TUN device in selected LXCs
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ item.0 }}.conf"
    regexp: "{{ item.1.regexp }}"
    line: "{{ item.1.line }}"
    state: present
  loop: "{{ _proxmox_tun_lxc_vmids | default([]) | product(_proxmox_tun_lxc_config_lines) | list }}"
  vars:
    _proxmox_tun_lxc_config_lines:
      - regexp: "^lxc\\.cgroup2\\.devices\\.allow: c 10:200 rwm$"
        line: "lxc.cgroup2.devices.allow: c 10:200 rwm"
      - regexp: "^lxc\\.mount\\.entry: /dev/net/tun dev/net/tun none bind,create=file$"
        line: "lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file"
  register: _proxmox_tun_config

- name: Reboot LXCs after TUN changes
  ansible.builtin.command: "pct reboot {{ item }}"
  loop: "{{ _proxmox_tun_lxc_vmids | default([]) }}"
  when: _proxmox_tun_config.changed
