---
- name: Ensure edge packages are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - debian-archive-keyring
      - debian-keyring
      - gnupg
      - openssl
    state: present
    update_cache: true

- name: Ensure Cloudsmith keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Install Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /tmp/caddy-stable.gpg.key
    mode: "0644"

- name: Convert Caddy signing key to gpg keyring
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy-stable.gpg.key
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    filename: caddy-stable
    state: present

- name: Ensure edge packages are up to date after repo setup
  ansible.builtin.apt:
    name:
      - caddy
    state: present
    update_cache: true

- name: Download upstream lego archive
  ansible.builtin.get_url:
    url: "{{ edge_lego_archive_url }}"
    dest: "/tmp/lego_v{{ edge_lego_version }}_linux_amd64.tar.gz"
    mode: "0644"
  when: edge_tls_mode == "public_dns"

- name: Install upstream lego binary
  ansible.builtin.unarchive:
    src: "/tmp/lego_v{{ edge_lego_version }}_linux_amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - lego
    owner: root
    group: root
    mode: "0755"
  when: edge_tls_mode == "public_dns"

- name: Verify lego supports Cloudflare DNS provider
  ansible.builtin.command:
    cmd: /usr/local/bin/lego dnshelp cloudflare
  changed_when: false
  when: edge_tls_mode == "public_dns"

- name: Validate public DNS certificate settings
  ansible.builtin.assert:
    that:
      - edge_acme_email | length > 0
      - edge_acme_cloudflare_dns_api_token | length > 0
    fail_msg: "edge_tls_mode=public_dns requires EDGE_ACME_EMAIL and CLOUDFLARE_DNS_API_TOKEN."
  when: edge_tls_mode == "public_dns"
  no_log: true

- name: Ensure lego directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/lego
      owner: root
      group: root
      mode: "0700"
    - path: /var/lib/lego
      owner: root
      group: root
      mode: "0750"
    - path: /etc/caddy/certs
      owner: root
      group: caddy
      mode: "0750"
  when: edge_tls_mode == "public_dns"

- name: Render lego environment file
  ansible.builtin.copy:
    dest: /etc/lego/edge.env
    owner: root
    group: root
    mode: "0600"
    content: |
      EDGE_ACME_EMAIL={{ edge_acme_email | quote }}
      EDGE_ACME_DOMAIN={{ edge_base_domain | quote }}
      EDGE_ACME_LEGO_CERT_PATH={{ edge_acme_lego_cert_path | quote }}
      EDGE_ACME_LEGO_KEY_PATH={{ edge_acme_lego_key_path | quote }}
      EDGE_TLS_CERT_PATH={{ edge_tls_cert_path | quote }}
      EDGE_TLS_KEY_PATH={{ edge_tls_key_path | quote }}
      CLOUDFLARE_DNS_API_TOKEN={{ edge_acme_cloudflare_dns_api_token | quote }}
      CF_DNS_API_TOKEN={{ edge_acme_cloudflare_dns_api_token | quote }}
      CLOUDFLARE_PROPAGATION_TIMEOUT={{ edge_acme_dns_propagation_timeout | quote }}
      CLOUDFLARE_POLLING_INTERVAL={{ edge_acme_dns_polling_interval | quote }}
  when: edge_tls_mode == "public_dns"
  no_log: true

- name: Install lego certificate renewal script
  ansible.builtin.copy:
    dest: /usr/local/sbin/lego-edge-cert-renew
    owner: root
    group: root
    mode: "0750"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      set -a
      # shellcheck disable=SC1091
      . /etc/lego/edge.env
      set +a

      lego_args=(
        --accept-tos
        --path /var/lib/lego
        --email "${EDGE_ACME_EMAIL}"
        --dns cloudflare
        --domains "${EDGE_ACME_DOMAIN}"
        --domains "*.${EDGE_ACME_DOMAIN}"
      )

      cert_has_expected_names() {
        [[ -f "${EDGE_ACME_LEGO_CERT_PATH}" ]] || return 1
        openssl x509 -in "${EDGE_ACME_LEGO_CERT_PATH}" -noout -ext subjectAltName \
          | grep -F "DNS:${EDGE_ACME_DOMAIN}" \
          | grep -F "DNS:*.${EDGE_ACME_DOMAIN}" >/dev/null
      }

      sync_caddy_certs() {
        install -d -o root -g caddy -m 0750 /etc/caddy/certs
        install -o root -g caddy -m 0640 "${EDGE_ACME_LEGO_CERT_PATH}" "${EDGE_TLS_CERT_PATH}"
        install -o root -g caddy -m 0640 "${EDGE_ACME_LEGO_KEY_PATH}" "${EDGE_TLS_KEY_PATH}"
      }

      if [[ -f "${EDGE_ACME_LEGO_CERT_PATH}" && -f "${EDGE_ACME_LEGO_KEY_PATH}" ]] && cert_has_expected_names; then
        /usr/local/bin/lego "${lego_args[@]}" renew --renew-hook "systemctl reload caddy"
        sync_caddy_certs
      else
        if [[ -f "${EDGE_ACME_LEGO_CERT_PATH}" && -f "${EDGE_ACME_LEGO_KEY_PATH}" ]]; then
          /usr/local/bin/lego "${lego_args[@]}" renew --days 999 --renew-hook "systemctl reload caddy"
        else
          /usr/local/bin/lego "${lego_args[@]}" run
        fi
        sync_caddy_certs
        systemctl reload caddy || true
      fi
  when: edge_tls_mode == "public_dns"

- name: Install lego renewal service
  ansible.builtin.copy:
    dest: /etc/systemd/system/lego-edge-cert-renew.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Renew lab edge wildcard certificate with lego
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/lego-edge-cert-renew
  when: edge_tls_mode == "public_dns"

- name: Install lego renewal timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/lego-edge-cert-renew.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Renew lab edge wildcard certificate daily

      [Timer]
      OnCalendar=*-*-* 03:35:00
      Persistent=true
      RandomizedDelaySec=1h

      [Install]
      WantedBy=timers.target
  when: edge_tls_mode == "public_dns"

- name: Ensure initial public wildcard certificate exists
  ansible.builtin.command:
    cmd: /usr/local/sbin/lego-edge-cert-renew
    creates: "{{ edge_tls_cert_path }}"
  when: edge_tls_mode == "public_dns"

- name: Read public wildcard certificate SANs
  ansible.builtin.command:
    cmd: "openssl x509 -in {{ edge_tls_cert_path | quote }} -noout -ext subjectAltName"
  register: edge_public_cert_sans
  changed_when: false
  when: edge_tls_mode == "public_dns"

- name: Verify public wildcard certificate covers lab hosts
  ansible.builtin.assert:
    that:
      - ("DNS:" ~ edge_base_domain) in edge_public_cert_sans.stdout
      - ("DNS:*." ~ edge_base_domain) in edge_public_cert_sans.stdout
    fail_msg: "The active edge certificate must include {{ edge_base_domain }} and *.{{ edge_base_domain }}."
  when: edge_tls_mode == "public_dns"

- name: Enable lego renewal timer
  ansible.builtin.systemd:
    name: lego-edge-cert-renew.timer
    enabled: true
    state: started
    daemon_reload: true
  when: edge_tls_mode == "public_dns"

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: Restart Caddy

- name: Ensure Caddy service is enabled
  ansible.builtin.service:
    name: caddy
    enabled: true
    state: started

- name: Apply Caddy configuration before collecting local CA
  ansible.builtin.meta: flush_handlers

- name: Ensure active Caddy process has loaded the rendered config
  ansible.builtin.command:
    cmd: caddy reload --config /etc/caddy/Caddyfile
  changed_when: false

- name: Ensure Caddy local CA directory exists
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates/caddy
    state: directory
    mode: "0755"
  when: edge_tls_mode != "public_dns"

- name: Wait for Caddy local root certificate to exist
  ansible.builtin.wait_for:
    path: /var/lib/caddy/.local/share/caddy/pki/authorities/local/root.crt
    timeout: 30
  when: edge_tls_mode != "public_dns"

- name: Copy Caddy local root certificate to a standard trust location
  ansible.builtin.copy:
    src: /var/lib/caddy/.local/share/caddy/pki/authorities/local/root.crt
    dest: /usr/local/share/ca-certificates/caddy/root.crt
    remote_src: true
    mode: "0644"
  register: caddy_root_cert
  when: edge_tls_mode != "public_dns"

- name: Update CA trust store with Caddy local root
  ansible.builtin.command: update-ca-certificates
  when:
    - edge_tls_mode != "public_dns"
    - caddy_root_cert.changed
