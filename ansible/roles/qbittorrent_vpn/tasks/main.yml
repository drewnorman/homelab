---
- name: Require Proton WireGuard config
  ansible.builtin.assert:
    that:
      - qbittorrent_vpn_wireguard_config_b64 | length > 0
    fail_msg: "Set PROTONVPN_WIREGUARD_CONFIG_B64 to the base64-encoded Proton VPN WireGuard config."
  no_log: true

- name: Install qBittorrent VPN dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - nftables
      - openresolv
      - qbittorrent-nox
      - wireguard-tools
    state: present
    update_cache: true

- name: Create media group
  ansible.builtin.group:
    name: media
    gid: 1000
    system: true
    state: present

- name: Create qBittorrent user
  ansible.builtin.user:
    name: "{{ qbittorrent_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/qbittorrent
    create_home: true
    groups: media
    append: true
    state: present

- name: Create download directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_user }}"
    group: media
    mode: "0775"
  loop:
    - "{{ arr_downloads_path }}"
    - "{{ arr_downloads_path }}/complete"
    - "{{ arr_downloads_path }}/complete/movies"
    - "{{ arr_downloads_path }}/complete/tv"
    - "{{ arr_downloads_path }}/incomplete"

- name: Ensure WireGuard config directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install Proton VPN WireGuard config
  ansible.builtin.copy:
    dest: "/etc/wireguard/{{ qbittorrent_vpn_interface }}.conf"
    content: "{{ qbittorrent_vpn_wireguard_config_b64 | b64decode }}"
    owner: root
    group: root
    mode: "0600"
  register: _qbittorrent_vpn_wireguard_config
  no_log: true

- name: Install qBittorrent VPN nftables rules
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0755"
  register: _qbittorrent_vpn_nftables

- name: Enable nftables kill switch
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: restarted
  when: _qbittorrent_vpn_nftables.changed

- name: Ensure nftables is running
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Enable Proton VPN WireGuard interface
  ansible.builtin.service:
    name: "wg-quick@{{ qbittorrent_vpn_interface }}"
    enabled: true
    state: restarted
  when: _qbittorrent_vpn_wireguard_config.changed

- name: Ensure Proton VPN WireGuard interface is running
  ansible.builtin.service:
    name: "wg-quick@{{ qbittorrent_vpn_interface }}"
    enabled: true
    state: started

- name: Create qBittorrent systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/qbittorrent-nox@.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Bind qBittorrent service startup to VPN and firewall
  ansible.builtin.copy:
    dest: /etc/systemd/system/qbittorrent-nox@.service.d/vpn.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Requires=nftables.service wg-quick@{{ qbittorrent_vpn_interface }}.service
      After=nftables.service wg-quick@{{ qbittorrent_vpn_interface }}.service
  register: _qbittorrent_vpn_systemd_override

- name: Reload systemd after qBittorrent override changes
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: _qbittorrent_vpn_systemd_override.changed

- name: Check qBittorrent config settings
  ansible.builtin.shell: |
    grep -qF 'WebUI\LocalHostAuth=false' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Bittorrent\MaxRatioEnabled=true' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Bittorrent\MaxRatio=0' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Connection\Interface={{ qbittorrent_vpn_interface }}' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Connection\PortRangeMin={{ qbittorrent_listen_port }}' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Session\GlobalMaxRatio=0' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Session\MaxRatioAction=0' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Downloads\SavePath={{ arr_downloads_path }}/complete' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Downloads\TempPath={{ arr_downloads_path }}/incomplete' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf &&
    grep -qF 'Downloads\TempPathEnabled=true' /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf
  register: _qbt_config_check
  changed_when: false
  failed_when: false

- name: Stop qBittorrent to safely apply config
  ansible.builtin.service:
    name: "qbittorrent-nox@{{ qbittorrent_user }}"
    state: stopped
  when: _qbt_config_check.rc != 0

- name: Configure qBittorrent settings
  community.general.ini_file:
    path: /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf
    section: Preferences
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: "{{ qbittorrent_user }}"
    group: "{{ qbittorrent_user }}"
    mode: "0600"
    create: true
    no_extra_spaces: true
  loop:
    - { option: "WebUI\\LocalHostAuth", value: "false" }
    - { option: "Bittorrent\\MaxRatioEnabled", value: "true" }
    - { option: "Bittorrent\\MaxRatio", value: "0" }
    - { option: "Bittorrent\\MaxRatioAction", value: "0" }
    - { option: "Connection\\Interface", value: "{{ qbittorrent_vpn_interface }}" }
    - { option: "Connection\\PortRangeMin", value: "{{ qbittorrent_listen_port }}" }
    - { option: "Session\\GlobalMaxRatio", value: "0" }
    - { option: "Session\\MaxRatioAction", value: "0" }
    - { option: "Downloads\\SavePath", value: "{{ arr_downloads_path }}/complete" }
    - { option: "Downloads\\TempPath", value: "{{ arr_downloads_path }}/incomplete" }
    - { option: "Downloads\\TempPathEnabled", value: "true" }
  when: _qbt_config_check.rc != 0

- name: Enable qBittorrent service
  ansible.builtin.service:
    name: "qbittorrent-nox@{{ qbittorrent_user }}"
    enabled: true
    state: started

- name: Get qBittorrent live preferences
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_port }}/api/v2/app/preferences"
    return_content: true
  register: _qbt_live_preferences
  until: _qbt_live_preferences.status == 200
  retries: 30
  delay: 2

- name: Configure qBittorrent live preferences
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_port }}/api/v2/app/setPreferences"
    method: POST
    body_format: form-urlencoded
    body:
      json: "{{ {'save_path': arr_downloads_path + '/complete', 'temp_path': arr_downloads_path + '/incomplete', 'temp_path_enabled': true, 'max_ratio_enabled': true, 'max_ratio': 0, 'max_ratio_act': 0, 'current_network_interface': qbittorrent_vpn_interface, 'listen_port': qbittorrent_listen_port} | to_json }}"
  when: >
    _qbt_live_preferences.json.save_path != arr_downloads_path + '/complete' or
    _qbt_live_preferences.json.temp_path != arr_downloads_path + '/incomplete' or
    not _qbt_live_preferences.json.temp_path_enabled or
    not (_qbt_live_preferences.json.max_ratio_enabled | default(false) | bool) or
    (_qbt_live_preferences.json.max_ratio | default(-1) | float) != 0.0 or
    (_qbt_live_preferences.json.max_ratio_act | default(-1) | int) != 0 or
    (_qbt_live_preferences.json.current_network_interface | default('')) != qbittorrent_vpn_interface or
    (_qbt_live_preferences.json.listen_port | default(-1) | int) != (qbittorrent_listen_port | int)
