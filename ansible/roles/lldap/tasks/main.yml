---
- name: Install LLDAP dependencies
  ansible.builtin.apt:
    name:
      - openssl
      - sqlite3
    state: present
    update_cache: true

- name: Create lldap group
  ansible.builtin.group:
    name: lldap
    system: true
    state: present

- name: Create lldap user
  ansible.builtin.user:
    name: lldap
    system: true
    group: lldap
    shell: /usr/sbin/nologin
    home: /var/lib/lldap
    create_home: false
    state: present

- name: Ensure LLDAP directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/lldap
      owner: root
      group: lldap
      mode: "0750"
    - path: /var/lib/lldap
      owner: lldap
      group: lldap
      mode: "0750"

- name: Check installed LLDAP version
  ansible.builtin.command:
    cmd: /usr/local/bin/lldap --version
  register: _lldap_version_check
  changed_when: false
  failed_when: false

- name: Download LLDAP archive
  ansible.builtin.get_url:
    url: "{{ lldap_archive_url }}"
    dest: "/tmp/lldap-v{{ lldap_version }}-linux-amd64.tar.gz"
    mode: "0644"
  when: lldap_version not in (_lldap_version_check.stdout | default(''))
  register: _lldap_archive

- name: Install LLDAP binary
  ansible.builtin.unarchive:
    src: "/tmp/lldap-v{{ lldap_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - lldap
    owner: root
    group: root
    mode: "0755"
  when: _lldap_archive is changed
  notify: Restart LLDAP

- name: Generate LLDAP JWT secret
  ansible.builtin.shell:
    cmd: openssl rand -hex 32 > /etc/lldap/jwt_secret
    creates: /etc/lldap/jwt_secret
  notify: Restart LLDAP

- name: Set JWT secret file permissions
  ansible.builtin.file:
    path: /etc/lldap/jwt_secret
    owner: root
    group: lldap
    mode: "0640"

- name: Read LLDAP JWT secret
  ansible.builtin.slurp:
    src: /etc/lldap/jwt_secret
  register: _lldap_jwt_secret

- name: Validate LLDAP admin password is set
  ansible.builtin.assert:
    that:
      - lldap_admin_password | length > 0
    fail_msg: >-
      lldap_admin_password must be set.
      Export LLDAP_ADMIN_PASSWORD='<password>' before running ansible-playbook.

- name: Render LLDAP environment file
  ansible.builtin.template:
    src: lldap.env.j2
    dest: /etc/lldap/lldap.env
    owner: root
    group: lldap
    mode: "0640"
  notify: Restart LLDAP

- name: Install LLDAP systemd service
  ansible.builtin.template:
    src: lldap.service.j2
    dest: /etc/systemd/system/lldap.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart LLDAP

- name: Ensure LLDAP service is enabled and started
  ansible.builtin.systemd:
    name: lldap
    enabled: true
    state: started
    daemon_reload: true
