---
- name: Ensure Tailscale keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"
  when: tailscale_enabled

- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/{{ tailscale_track }}/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  when: tailscale_enabled

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/{{ tailscale_track }}/debian {{ ansible_distribution_release }} main"
    filename: tailscale
    state: present
  when: tailscale_enabled

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  when: tailscale_enabled

- name: Enable IPv4 forwarding for subnet routes
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true
  when: tailscale_enabled and tailscale_advertised_routes | length > 0

- name: Enable IPv6 forwarding for subnet routes
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true
  when: tailscale_enabled and tailscale_advertised_routes | length > 0

- name: Enable Tailscale daemon
  ansible.builtin.service:
    name: tailscaled
    enabled: true
    state: started
  when: tailscale_enabled

- name: Check Tailscale status
  ansible.builtin.command: /usr/bin/tailscale status --json
  register: _tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_enabled

- name: Require auth key for first Tailscale login
  ansible.builtin.assert:
    that:
      - tailscale_auth_key | length > 0
    fail_msg: "Set TAILSCALE_AUTH_KEY for the first lab-edge Tailscale login."
  when: tailscale_enabled and _tailscale_status.rc != 0
  no_log: true

- name: Configure Tailscale
  ansible.builtin.shell: >-
    /usr/bin/tailscale up
    --hostname={{ tailscale_hostname | quote }}
    --advertise-routes={{ tailscale_advertised_routes | join(',') | quote }}
    --accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}
    {% if tailscale_auth_key | length > 0 %}--auth-key="$TS_AUTH_KEY"{% endif %}
  environment:
    TS_AUTH_KEY: "{{ tailscale_auth_key }}"
  changed_when: false
  when: tailscale_enabled
  no_log: "{{ tailscale_auth_key | length > 0 }}"
